name: CD

on:
  push:
    branches: [master]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    name: Build & push admin image

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version
        id: version
        run: echo "VERSION=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/imusic-admin:latest
            ${{ secrets.DOCKER_USERNAME }}/imusic-admin:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          driver: docker

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    name: Deploy to server

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy
          chmod 600 ~/.ssh/deploy
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Pull and restart admin container
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh -i ~/.ssh/deploy -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST} << 'ENDSSH'
            set -e

            DEPLOY_DIR="/opt/imusic"
            IMAGE="${{ secrets.DOCKER_USERNAME }}/imusic-admin:latest"

            mkdir -p "$DEPLOY_DIR"

            echo "=== pulling image ==="
            docker pull "$IMAGE"

            echo "=== stopping old container ==="
            docker stop imusic-admin 2>/dev/null || true
            docker rm imusic-admin 2>/dev/null || true

            echo "=== starting container ==="
            docker run -d \
              --name imusic-admin \
              --restart unless-stopped \
              -p 5173:80 \
              -e API_TARGET=http://81.71.155.61:8080 \
              "$IMAGE"

            echo "=== DEPLOY SUCCESS ==="
          ENDSSH
